@font-face { font-family:'Geist'; font-style:normal; font-weight:400 700; font-display:swap; src:url('/fonts/geist-latin.woff2') format('woff2'); }
@font-face { font-family:'Geist'; font-style:normal; font-weight:400 700; font-display:swap; src:url('/fonts/geist-latin-ext.woff2') format('woff2'); unicode-range:U+0100-024F,U+1E00-1EFF; }
:root{--bg:#0b0d12;--card:#171a21;--line:rgba(255,255,255,.09);--text:#f4ecdd;--text-dim:#a7a99f;--gold-bright:#e6cf96;--gold:#cba85f;--gold-deep:#a5823c}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Geist',system-ui,sans-serif;background:linear-gradient(rgba(8,10,14,.64),rgba(8,10,14,.82)),url('/img/obrigado-bg.webp') center/cover no-repeat;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px;line-height:1.55;-webkit-font-smoothing:antialiased}
.wrap{max-width:520px}
.logo{width:190px;height:auto;margin:0 auto 40px;display:block}
.check{width:78px;height:78px;margin:0 auto 26px;border-radius:50%;background:rgba(203,168,95,.14);display:flex;align-items:center;justify-content:center}
.check svg{width:40px;height:40px;stroke:var(--gold-bright);fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:clamp(28px,7vw,40px);font-weight:800;letter-spacing:-.03em;line-height:1.1}
h1 em{font-style:normal;color:var(--gold-bright)}
p{color:var(--text-dim);font-size:clamp(16px,4.2vw,18px);margin:18px auto 0;max-width:40ch}
.badges{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin:30px 0 0}
.badge{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:11px 20px;font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.badge svg{width:18px;height:18px;stroke:var(--gold);fill:none;stroke-width:1.7}
.insta{display:inline-block;margin-top:32px;color:var(--gold-bright);font-weight:700;font-size:15px;border-bottom:1px solid rgba(203,168,95,.4);padding-bottom:2px}
</style>

    <img class="logo" src="/img/logo-imersao.webp" alt="O Ano da Virada" width="982" height="401">
    <div class="check"><svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6.5"/></svg></div>
    <h1>Inscrição <em>confirmada</em>!</h1>
    <p>Você está na lista da Imersão O Ano da Virada. No dia, o link do evento entra no seu WhatsApp e e-mail. Fique de olho.</p>
    <div class="badges">
      <span class="badge"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg> Dia 23 de julho</span>
      <span class="badge"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> Às 20:00</span>
    </div>
    <a class="insta" href="https://www.instagram.com/falecomrian/" target="_blank" rel="noopener">Enquanto isso, siga o Rian no Instagram</a>
  </div>
