<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Painel · O Ano da Virada</title>
<style>
  :root{
    --bg:#f6f5f2; --card:#ffffff; --ink:#1a1a1a; --mut:#6b6b6b;
    --line:#e7e4dd; --gold:#b3842c; --gold-soft:#efe6d2; --green:#2e7d52;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums}
  .wrap{max-width:960px;margin:0 auto;padding:28px 18px 60px}
  header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  h1{font-size:22px;margin:0;letter-spacing:-.01em}
  h1 span{color:var(--gold)}
  .sub{color:var(--mut);font-size:13px;margin-top:4px}
  .refresh{border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:10px;padding:9px 14px;font-size:13px;cursor:pointer;font-weight:600}
  .refresh:hover{border-color:var(--gold)}
  .filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .filters button{border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:999px;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:600}
  .filters button.active{background:var(--gold);border-color:var(--gold);color:#fff}
  .filters button:hover:not(.active){border-color:var(--gold)}
  .filters input[type=date]{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
  .filters input[type=date].active{border-color:var(--gold);color:var(--gold)}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
  @media(max-width:640px){.cards{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .card .lbl{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .card .big{font-size:34px;font-weight:700;margin:6px 0 2px;letter-spacing:-.02em}
  .card .cap{font-size:12px;color:var(--mut)}
  section{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 18px 10px;margin-bottom:20px}
  section h2{font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin:16px 2px 4px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:right;padding:11px 8px;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);font-weight:700}
  tr:last-child td{border-bottom:none}
  .ori{position:relative}
  .bar{position:absolute;left:0;top:0;bottom:0;background:var(--gold-soft);border-radius:6px;z-index:0}
  .ori span{position:relative;z-index:1;font-weight:600}
  .tr-total td{background:var(--gold-soft);font-weight:700}
  .taxa{color:var(--green);font-weight:700}
  .muted{color:var(--mut)}
  .note{background:var(--gold-soft);border:1px solid #e8dcc0;color:#6b5a33;border-radius:12px;padding:12px 16px;font-size:13px;margin:0 0 20px;line-height:1.5}
  .ritmo{font-size:13px;color:var(--mut);margin:0 2px 16px}
  .ritmo b{color:var(--ink)}
  .ritmo .up{color:var(--green);font-weight:700}
  .ritmo .down{color:#b3402c;font-weight:700}
  .hours{display:flex;align-items:flex-end;gap:3px;height:110px;padding:10px 2px 0}
  .hbar{flex:1;background:var(--gold-soft);border-radius:3px 3px 0 0;min-height:2px}
  .hbar.peak{background:var(--gold)}
  .hlabels{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);padding:4px 2px 0}
  .msg{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:40px 22px;text-align:center;color:var(--mut)}
  .msg b{color:var(--ink)}
  code{background:#f0ede6;padding:2px 6px;border-radius:5px;font-size:13px}
  .foot{color:var(--mut);font-size:12px;text-align:center;margin-top:26px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Painel <span>· O Ano da Virada</span></h1>
      <div class="sub" id="sub">Carregando...</div>
    </div>
    <button class="refresh" id="refresh">Atualizar</button>
  </header>

  <div class="filters" id="filters">
    <button data-range="hoje" class="active">Hoje</button>
    <button data-range="ontem">Ontem</button>
    <button data-range="total">Total</button>
    <button data-range="3d">3 dias</button>
    <button data-range="7d">7 dias</button>
    <input type="date" id="diaPicker" min="2026-07-07" title="Ver um dia especifico">
  </div>

  <div id="app"></div>
  <div class="foot">Datas em horario de Brasilia. Visita conta 1 por sessao.</div>
</div>

<script>
const KEY = new URLSearchParams(location.search).get("key") || "";
const app = document.getElementById("app");
const sub = document.getElementById("sub");
let range = "hoje", customDate = "";

const LABELS = { hoje:"hoje", ontem:"ontem", "3d":"ultimos 3 dias", "7d":"ultimos 7 dias", total:"no total" };
const fmt = n => (n==null?"—":Number(n).toLocaleString("pt-BR"));
const pct = n => (n==null||n>100?"—":n.toLocaleString("pt-BR")+"%");
const diaBonito = d => { if(!d) return d; const p=d.split("-"); return p[2]+"/"+p[1]; };

async function load(){
  sub.textContent = "Carregando...";
  let data;
  try{
    let q = "/api/stats?key="+encodeURIComponent(KEY)+"&range="+range;
    if(range==="dia" && customDate) q += "&date="+customDate;
    const r = await fetch(q, {cache:"no-store"});
    if(r.status===401){ return msg("Chave invalida.", "Abra o painel com <code>?key=SUA-CHAVE</code> no final da URL."); }
    data = await r.json();
  }catch(e){ return msg("Erro ao carregar", "Tenta de novo em instantes."); }
  if(!data || !data.ok){ return msg("Sem dados ainda", "Assim que chegarem visitas e cadastros, aparecem aqui."); }
  render(data);
  const now = new Date();
  sub.textContent = "Atualizado as " + now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

function msg(t, s){ app.innerHTML = '<div class="msg"><b>'+t+'</b><br>'+s+'</div>'; sub.textContent=""; }

function render(d){
  const t = d.totais, lbl = (range==="dia" ? diaBonito(customDate) : (LABELS[d.range] || ""));
  let html = '<div class="cards">'
    + card("Visitas", fmt(t.visitas), lbl)
    + card("Cadastros", fmt(t.cadastros), lbl)
    + card("Conversao", pct(t.taxa), t.convVis ? ("rastreado: "+fmt(t.convCad)+" cad / "+fmt(t.convVis)+" vis") : "aguardando dia cheio")
    + '</div>';

  const p = d.pacing || {hoje:0,ontem:0,media:0};
  const arrow = p.ontem>=p.media ? '<span class="up">▲</span>' : '<span class="down">▼</span>';
  html += '<div class="ritmo">Ritmo de cadastros: hoje <b>'+fmt(p.hoje)+'</b> (parcial) · ontem <b>'+fmt(p.ontem)+'</b> '+arrow+' · media <b>'+fmt(p.media)+'</b>/dia</div>';

  const ts = d.trackStart ? diaBonito(d.trackStart) : "o inicio do rastreio";
  html += '<div class="note">A <b>conversao</b> usa so o periodo em que visita e cadastro sao contados juntos (a partir de '+ts+', 1o dia cheio do contador). Antes disso os cadastros tem historico sem visita par, entao a taxa fica "—". A coluna <b>cadastros</b> segue mostrando o historico completo.</div>';

  // por origem (com total ManyChat e Meta pago)
  const maxV = Math.max(1, ...d.porOrigem.map(o=>o.visitas));
  html += '<section><h2>Por origem ('+lbl+')</h2>' + tableHead(["Origem","Visitas","Cadastros","Taxa"]);
  if(!d.porOrigem.length) html += emptyRow(4);

  const isManychat = o => /manychat/i.test(o.origem);
  const isPago = o => { const m=(o.origem.split(" / ")[1]||"").toLowerCase(); return m==="pago"||m==="paid"||m==="ads"; };
  html += totalRow("Organico (ManyChat)", d.porOrigem.filter(isManychat));
  html += totalRow("Pago (Meta Ads)", d.porOrigem.filter(isPago));
  for(const o of d.porOrigem){
    const w = Math.round(o.visitas/maxV*100);
    html += '<tr><td class="ori"><span class="bar" style="width:'+w+'%"></span><span>'+o.origem+'</span></td>'
      + '<td>'+fmt(o.visitas)+'</td><td>'+fmt(o.cadastros)+'</td>'
      + '<td class="taxa">'+pct(o.taxa)+'</td></tr>';
  }
  html += '</table></section>';

  // por dia
  html += '<section><h2>Por dia</h2>' + tableHead(["Dia","Visitas","Cadastros","Taxa"]);
  const dias = d.porDia.slice(0,14);
  if(!dias.length) html += emptyRow(4);
  for(const o of dias){
    const hoje = o.dia===d.hoje;
    html += '<tr><td>'+diaBonito(o.dia)+(hoje?' <span class="muted">(hoje)</span>':'')+'</td>'
      + '<td>'+fmt(o.visitas)+'</td><td>'+fmt(o.cadastros)+'</td>'
      + '<td class="taxa">'+pct(o.taxa)+'</td></tr>';
  }
  html += '</table></section>';

  // por horario
  const hh = d.porHora || [];
  const maxH = Math.max(1, ...hh.map(o=>o.c));
  const peak = hh.reduce((a,b)=>b.c>a.c?b:a, {c:-1,hora:""});
  html += '<section><h2>Cadastros por horario ('+lbl+')</h2><div class="hours">';
  for(const o of hh){ const ht=Math.max(2, Math.round(o.c/maxH*100)); html += '<div class="hbar'+(o.hora===peak.hora&&o.c>0?' peak':'')+'" style="height:'+ht+'%" title="'+o.hora+'h: '+fmt(o.c)+'"></div>'; }
  html += '</div><div class="hlabels"><span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>23h</span></div>';
  if(peak.c>0) html += '<div class="muted" style="font-size:12px;padding:8px 2px 0">Pico de cadastros: <b style="color:var(--ink)">'+peak.hora+'h</b></div>';
  html += '</section>';

  // por versao
  html += '<section><h2>Por versao da pagina</h2>' + tableHead(["Versao","Visitas","Cadastros","Taxa"]);
  for(const o of d.porVersao){
    html += '<tr><td>'+o.versao+'</td><td>'+fmt(o.visitas)+'</td><td>'+fmt(o.cadastros)+'</td>'
      + '<td class="taxa">'+pct(o.taxa)+'</td></tr>';
  }
  html += '</table></section>';

  app.innerHTML = html;
}

function card(lbl, big, cap){
  return '<div class="card"><div class="lbl">'+lbl+'</div><div class="big">'+big+'</div><div class="cap">'+(cap||"")+'</div></div>';
}
function tableHead(cols){ return '<table><tr>'+cols.map(c=>'<th>'+c+'</th>').join('')+'</tr>'; }
function emptyRow(n){ return '<tr><td colspan="'+n+'" class="muted" style="text-align:center;padding:22px">Ainda sem registros nesse periodo.</td></tr>'; }
function totalRow(label, arr){
  if(!arr.length) return "";
  const v=arr.reduce((a,b)=>a+b.visitas,0), c=arr.reduce((a,b)=>a+b.cadastros,0);
  const tx=v?Math.round(c/v*1000)/10:null;
  return '<tr class="tr-total"><td>'+label+'</td><td>'+fmt(v)+'</td><td>'+fmt(c)+'</td><td class="taxa">'+pct(tx)+'</td></tr>';
}

document.getElementById("filters").addEventListener("click", function(e){
  const b = e.target.closest("button"); if(!b) return;
  range = b.getAttribute("data-range"); customDate = "";
  const dp = document.getElementById("diaPicker"); dp.value = ""; dp.classList.remove("active");
  for(const btn of this.querySelectorAll("button")) btn.classList.toggle("active", btn===b);
  load();
});
document.getElementById("diaPicker").addEventListener("change", function(){
  if(!this.value) return;
  range = "dia"; customDate = this.value;
  for(const btn of document.querySelectorAll("#filters button")) btn.classList.remove("active");
  this.classList.add("active");
  load();
});
document.getElementById("refresh").addEventListener("click", load);
load();
</script>
</body>
</html>
